name: Build and Deploy
on:
  push:
    tags: ['v*.*.*']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Copy config.yml to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "config.yml"
          target: "/opt/show-me-the-money"

      - name: Deploy to droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/show-me-the-money

            NEW_VERSION=${{ github.ref_name }}

            # Update the image tag in .env so docker compose picks up the new version
            sed -i "s/^BACKEND_VERSION=.*/BACKEND_VERSION=${NEW_VERSION}/" .env

            # Pull the newly published image for this tag
            docker compose pull backend

            # Restart the app container with the new image
            docker compose up -d backend
